<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="p-4">

<h1 class="mb-4">Search Results</h1>
<p id="searchQuery"></p>
<div id="results"></div>

<script>
	// 1. Get the search term from the URL
	const params = new URLSearchParams(window.location.search);
	const query = params.get("q").toLowerCase();
	document.getElementById("searchQuery").innerHTML = "Results for: <strong>" + query + "</strong>";

	// 2. List all pages to search
	const pages = [
		"index.html",
		"site1/crafts.html",
		"site2/jem.html",
		"site3/game.html",
		"site4/card_captor.html"
	];

	// 3. Search each page
	pages.forEach(page => {
		fetch(page)
			.then(response => response.text())
			.then(text => {

				if (text.toLowerCase().includes(query)) {

					// Find where the match occurs
					let index = text.toLowerCase().indexOf(query);
					let snippetStart = Math.max(0, index - 50);
					let snippetEnd = Math.min(text.length, index + query.length + 50);
					let snippet = text.substring(snippetStart, snippetEnd);

					// Clean snippet (remove HTML tags)
					snippet = snippet.replace(/<[^>]*>/g, "");

					let resultDiv = document.createElement("div");
					resultDiv.classList.add("mb-3", "p-3", "border", "rounded");

					resultDiv.innerHTML = `
						<h4><a href="${page}">${page}</a></h4>
						<p><strong>Snippet:</strong> ...${snippet}...</p>
					`;

					document.getElementById("results").appendChild(resultDiv);
				}

			});
	});
</script>

</body>
</html>
