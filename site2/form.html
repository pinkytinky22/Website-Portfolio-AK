	<body class="body">
		<div>
			<header>
				<h1 class="display-3 fw-bold">Card Captor</h1>
			</header>
			<div>
				<nav class="navbar navbar-expand-lg bg-cc-blue">
					<div class="container-fluid">
						<a class="navbar-brand" href="#">
						  <img src="resources/icon.ico" class="imgSize" alt="Bootstrap" width="30" height="24">
						</a>
						<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
						  <span class="navbar-toggler-icon"></span>
						</button>
						<div class="collapse navbar-collapse" id="navbarSupportedContent">
								<ul class="navbar-nav me-auto mb-2 mb-lg-0">
									<li class="nav-item">
										<a class="nav-link active" aria-current="page" href="chapter6.html">Home</a>
									</li>
									<li class="nav-item">
										<a class="nav-link" href="https://ccsakura.fandom.com/wiki/Cardcaptor_Sakura">Link</a>
									</li>
									<li class="nav-item dropdown">
										<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
										Dropdown
										</a>
										<ul class="dropdown-menu">
											<li><a class="dropdown-item" href="characters.html">About the Characters</a></li>
											<li><a class="dropdown-item" href="clow_cards.html">Clow Cards</a></li>

									<div class="form-check form-switch">
									  <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
									  <label class="form-check-label" for="switchCheckDefault">Click me!</label>
									</div>
								</ul>
							<form class="d-flex" role="search">
								<input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>

				<script> 
					document.getElementById("switchCheckDefault").addEventListener("change", function () { 
					if (this.checked) { 
					window.location.href = "index2.html"; 
					} 
				}); 
				</script>
			
		</div>
		
		<div class="container mt-5">
			<h1 class="display-6">Send a Message to Kero!</h1>
			<p class="fst-italic">
			Make sure to have your volume up when you submit!
			</p>
			
			<form id="keroForm">
				<div class="mb-3">
					<label for="nameInput" class="form-label">Your Name</label>
					<input type="text" class="form-control" id="nameInput" placeholder="Enter your name" required>
				</div>
				
				<div class="mb-3">
					<label for="emailInput" class="form-label">Email address</label>
					<input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
				</div>
				
				<div class="mb-3"> 
					<label for="messageInput" class="form-label">Your Message</label> 
					<textarea class="form-control" id="messageInput" rows="4" placeholder="Write your message to Kero here" required></textarea> 
				</div>
				
				<button type="submit" class="btn btn-primary"> <img src="resources/kero3.png" alt="Kero" style="width:20px; height:20px; margin-right:6px;"> Send Message </button>
			</form>
			<br>
		</div>
		<audio id="theme"> <source src="resources/opening_theme.mp3" type="audio/mpeg"> </audio>
		<script> 
			document.querySelector("#keroForm").addEventListener("submit", function(event) { 
				event.preventDefault();
				document.getElementById("theme").play(); 
			}); 
		</script>
	</body>
</html>
